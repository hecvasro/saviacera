# Decap CMS configuration for Saviacera.
#
# Maps the Astro content collection schema (src/content.config.ts) onto the
# Decap editor UI. Each commit Decap makes is a git commit on `main`, which
# triggers the Cloudflare Workers Builds auto-deploy.

backend:
  name: github
  repo: hecvasro/saviacera
  branch: main
  # Auth handshake: our Worker's /api/auth opens a popup, returns a fake-token
  # postMessage to Decap. There's no real GitHub OAuth flow — auth is gated
  # by Cloudflare Access (magic-link to whitelisted emails). The "token" Decap
  # stores is the CF Access JWT, which our proxy verifies on each API call.
  base_url: https://saviacera.com
  auth_endpoint: /api/auth
  # api_root: route Decap's GitHub API calls through our Worker proxy. The
  # proxy mints a short-lived GitHub App installation token (scoped to this
  # one repo) and forwards the request to api.github.com. No user OAuth, no
  # PAT, no manual rotation.
  api_root: https://saviacera.com/api/github
  # commit_messages: customize the autocommit subjects so git log stays readable.
  commit_messages:
    create: "CMS: nuevo {{collection}} «{{slug}}»"
    update: "CMS: actualizar {{collection}} «{{slug}}»"
    delete: "CMS: borrar {{collection}} «{{slug}}»"
    uploadMedia: "CMS: subir imagen «{{path}}»"
    deleteMedia: "CMS: borrar imagen «{{path}}»"

# Spanish (DR) UI strings on labels and helper text. The Decap interface chrome
# itself defaults to English; we can switch it to Spanish later via the
# `locale` option once we're sure the wife is comfortable.
locale: en

# Media — where uploaded images land in the repo and how they're referenced
# from frontmatter.
media_folder: public/uploads
public_folder: /uploads
# Cap uploaded files at ~1.5 MB so the repo doesn't bloat with phone-camera
# originals. The owner-onboarding doc explains how to compress with TinyPNG.
max_file_size: 1500000

collections:
  # ---------------------------------------------------------------------------
  # Products — one markdown file per product. Mirrors the Zod schema in
  # src/content.config.ts. Frontmatter format is YAML so we read it cleanly.
  # ---------------------------------------------------------------------------
  - name: products
    label: Productos
    label_singular: Producto
    folder: src/content/products
    create: true
    delete: true
    # identifier_field: Decap defaults to `title` for slug + entry identity.
    # Our schema has no `title` (it uses `name`); without this line Decap
    # can't resolve {{slug}} and falls back to serializing the whole entry
    # into the filename (e.g. "map-name-...-pricedop-250.md"). Point it at
    # `name` so {{slug}} = slugify(name) → "morning-brew.md".
    identifier_field: name
    slug: "{{slug}}" # filename = slug (Astro convention)
    format: yaml-frontmatter
    summary: "{{name}} — RD${{priceDOP}} ({{category}})"
    sortable_fields: [order, priceDOP, createdAt, name]
    view_filters:
      - label: Disponibles
        field: available
        pattern: true
      - label: Destacados
        field: featured
        pattern: true
    fields:
      - { name: name, label: Nombre, widget: string }
      - {
          name: tagline,
          label: Frase corta,
          widget: string,
          required: false,
          hint: "Opcional. Aparece debajo del nombre.",
        }
      - { name: description, label: Descripción, widget: text, hint: "Texto corto, 2–3 líneas." }
      - name: category
        label: Categoría
        widget: select
        options:
          - { label: Velas, value: velas }
          - { label: Ambientadores, value: ambientadores }
          - { label: Difusores, value: difusores }
          - { label: Jabones, value: jabones }
          - { label: Sets, value: sets }
          - { label: Otros, value: otros }
        hint: "Determina dónde aparece el producto en el catálogo."
      - name: tags
        label: Etiquetas
        widget: list
        required: false
        hint: "Para sets, usa la ocasión (san-valentin, dia-de-las-madres, etc.)."
      - { name: priceDOP, label: "Precio (RD$)", widget: number, value_type: int, min: 0, step: 1 }
      - { name: sku, label: SKU, widget: string, required: false }
      - {
          name: available,
          label: Disponible,
          widget: boolean,
          default: true,
          hint: "Apaga esto para esconder el producto del sitio sin borrarlo.",
        }
      - {
          name: variantLabel,
          label: "Nombre de la variación (opcional)",
          widget: string,
          required: false,
          hint: 'Si este producto viene en varias opciones, ponle nombre al grupo: "Aroma", "Tipo de cera", "Tamaño". Déjalo vacío si el producto no tiene variaciones.',
        }
      - name: variants
        label: "Opciones / variaciones"
        label_singular: Opción
        widget: list
        required: false
        summary: "{{fields.name}}"
        hint: "Cada fila es una opción que el cliente puede elegir (ej. Lavanda, Coco, Vainilla). El cliente la escoge antes de agregar al carrito y aparece en el pedido de WhatsApp."
        fields:
          - { name: name, label: Opción, widget: string }
          - {
              name: priceDOP,
              label: "Precio de esta opción (RD$) — opcional",
              widget: number,
              value_type: int,
              required: false,
              min: 0,
              step: 1,
              hint: "Déjalo vacío para usar el precio normal del producto. Úsalo solo si una opción cuesta distinto (ej. un tamaño más grande).",
            }
          - { name: sku, label: SKU de la opción (opcional), widget: string, required: false }
      - name: images
        label: Fotos
        widget: list
        # Each list item is a single image picker.
        field: { name: image, label: Imagen, widget: image }
        hint: "La primera foto es la portada. Idealmente cuadradas, comprimidas a <1 MB."
      - name: includes
        label: "Incluye (solo sets)"
        widget: list
        required: false
        field: { name: item, label: Item, widget: string }
        hint: "Sólo aplica a sets. Lista cada cosa que viene en la caja."
      - name: details
        label: Detalles
        widget: list
        required: false
        field: { name: detail, label: Detalle, widget: string }
        hint: 'Ej: "Aroma: coco + vainilla", "Duración: ~40 h".'
      - {
          name: featured,
          label: Destacado,
          widget: boolean,
          default: false,
          hint: "Si está activo, aparece en la portada en «Favoritos» o «Sets destacados».",
        }
      - {
          name: order,
          label: Orden,
          widget: number,
          value_type: int,
          default: 100,
          hint: "Más bajo aparece primero. Deja 100 si no te importa el orden.",
        }
      - {
          name: createdAt,
          label: Fecha de creación,
          widget: datetime,
          required: false,
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          picker_utc: false,
        }
      - {
          name: body,
          label: Texto largo (opcional),
          widget: markdown,
          required: false,
          hint: "Aparece debajo de la descripción en la página del producto. Puedes formatear con negritas, listas, etc.",
        }

  # ---------------------------------------------------------------------------
  # Sitio — imágenes principales que no pertenecen a un producto (hero de la
  # portada, imagen del footer, galería de Personalizados / Eventos
  # Corporativos). Singleton: un solo archivo JSON consumido por las páginas.
  # ---------------------------------------------------------------------------
  - name: site
    label: Sitio
    label_singular: Imágenes del sitio
    editor:
      preview: false
    files:
      - name: images
        label: Imágenes principales
        file: src/content/site/images.json
        description: >-
          Cambia las fotos que aparecen en la portada, el footer, y la galería
          de Personalizados / Eventos Corporativos. Las imágenes se suben aquí
          mismo (botón "Choose an image").
        fields:
          - name: homeHero
            label: "Hero de la portada (foto principal en la página de inicio)"
            widget: image
          - name: footerImage
            label: "Imagen del footer"
            widget: image
            required: false
            hint: "Aparece al pie de cada página. Puede ser una foto decorativa o un mark/logo."
          - name: personalizadosGallery
            label: "Galería de Personalizados / Eventos Corporativos"
            widget: list
            summary: "{{fields.image}}"
            field:
              name: image
              label: Imagen
              widget: image
